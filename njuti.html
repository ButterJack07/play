const DA_VARIANTS = {"0":["在现代工程学院的实验室里做材料拉伸实验，数据出来的一刻忍不住点头；下午骑着车穿过仙林校区去工程管理学院听工业工程的案例课，发现同一个问题有完全不同的解法。","在仙林校区基础实验楼的力学实验室里反复拉了三组样条，确认数据曲线完全吻合理论模型后才心满意足地收拾书包；中午在四食堂碰到工程管理学院的学长，边吃饭边听他吐槽ERP系统模拟课的奇葩队友。","骑着共享单车从现代工学院赶往工程管理学院的路上，车轮碾过香雪海飘落的樱花花瓣；晚上在杜厦图书馆借了一本《材料科学基础》，翻到某一页发现上任使用者用铅笔写的批注，像在和陌生人隔空对话。"],"1":["在建良楼的设计教室里用参数化建模工具生成建筑表皮方案，旁边同学用AI跑出来的城市肌理图让你眼前一亮；下午去鼓楼校区看北大楼，在心里默默对比着古典立面与现代幕墙的比例关系。","在建良楼的评图大厅里站了一上午，听老师和同学轮番点评自己做的旧改方案，图纸上用红笔圈出的修改意见密密麻麻；中午一个人坐在北大楼前的长椅上，抬头研究民国建筑窗楣的线脚比例。","在虚拟现实实验室里戴上头显，走进自己设计的参数化建筑空间里\u201c实地\u201d走了一圈，发现走廊宽度少算了20公分，赶紧退出来改参数；晚上和同学在鼓楼南园讨论\u201c如何用算法生成江南园林的拓扑结构\u201d。"],"2":["在苏州校区仁寿山脚下的未来实验室里，和队友围在一起调试机器人运动控制算法；施毅院士来项目组听汇报，随口一句点拨就让困扰你们三天的bug迎刃而解。","在苏州校区未来技术学院的地下实验室里给四足机器人换了新电机，通电试跑时它后腿一瘸一拐的样子让大家笑了半天；下午在仁寿山上的凉亭里和导师讨论芯片散热方案，山风把实验记录纸吹得哗哗响。","在智能机器人实验室里盯着机械臂抓取物体的动作重复了一百遍，记录每一帧的位姿误差数据；晚饭后沿着苏州校区的智湖散步，遇到同样在散步的项目组师兄，两人站着聊了半小时传感器选型。"],"3":["清晨在苏州校区的智慧教室里讨论自动化控制原理，窗外就是现代化的产业园；下午在集成电路实训平台上手操作EDA工具，晚上和同学去校区旁边的太湖边散步。","在苏州校区集成电路学院的洁净室外透过玻璃看里面的光刻机，师兄说这台机器比你的学费还贵几个量级；下午在数字经济课上用爬虫抓了苏州产业园区的企业数据做热力图，发现离校区越近的初创公司密度越高。","在苏州校区的智慧教室里用MATLAB仿真自动化产线的调度方案，仿真跑完的瞬间系统提示\u201c节拍优化22%\u201d，忍不住截图发朋友圈；傍晚和室友去校门口坐有轨电车，看着窗外的产业园大楼一盏盏亮起灯火。"],"4":["在仙林校区化学楼里合成了一个新的有机化合物，旋蒸结束后产物纯度比预期还高；下午去生命科学学院的温室观察拟南芥的生长表型，和师兄讨论基因编辑实验的下一步方案。","在生命科学学院的无菌操作台前接种了一批转基因大肠杆菌，标记好培养皿后贴在恒温箱门上；中午在二食堂遇到从化学楼过来的同学，他手里还捏着一管刚取出的样品，两人隔着餐桌讨论熔点数据。","在仙林化学楼的通风橱里搭了一套回流装置，等待反应的那半小时里站在窗前看楼下的银杏大道发呆；下午去生科院的实验田拔草做植物表型观测，蹲在地里一蹲就是两小时，站起来时腿都麻了。"],"5":["在仙林校区的地球科学博物馆里对着岩石薄片看显微镜，认出了一种典型的花岗岩结构；野外实习时在汤山地质剖面边听教授讲解，边在记录本上画地层素描。","在仙林校区地科院的地震数据处理实验室里盯着波形图看了一下午，终于识别出一个微弱的前震信号；周末跟着教授去六合方山考察火山岩地貌，在烈日下画地质剖面图，防晒霜和汗混在一起流进眼睛。","在GIS实验室里用ArcMap处理遥感影像，把仙林校区十年间的卫星图叠在一起看植被变化，绿地从一片变成了一大片；晚上在宿舍用Python画大气环流模型，室友凑过来看了一眼说\u201c这图好科幻\u201d。"],"6":["在数学学院大楼的自习室里推导泛函分析的一道难题，草稿纸铺满了整张桌子；下午去物理学院的近代物理实验室做全息干涉实验，激光在台面上投出漂亮的条纹。","在数学学院一楼的讨论室里和白板上的一道拓扑证明题死磕了三小时，写满了擦、擦了又写，终于找到思路时走廊里已经空无一人；去物理学院的路上看到一个同学在做单摆实验，忍不住停下来猜了猜他的摆长和周期的关系。","在声学研究所的消音室里待了五分钟，安静得能听见自己心跳的声音，出来后发现外面世界的一切都显得特别吵；下午在杜厦图书馆咖啡区跟数学系的同学赌一道概率题的结果，输了的人请喝奶茶。"],"7":["在匡亚明学院的学术报告厅里听了一场诺贝尔奖得主的讲座，结束后追上去问了一个憋了半小时的问题；下午和导师讨论暑研方向的选择，导师说\u201c你想做什么我都支持\u201d。","在匡亚明学院的图书室里翻到一本导师推荐的英文专著，借回去读了一整夜，天亮时发现窗外香樟树上的鸟叫了；下午在国际会议中心用英文给来访的MIT教授做科研展示，对方问了一个你没准备的问题，你愣了两秒然后老实说\u201c我还没想到这个角度\u201d。","在仙林校区的星云楼下和导师讨论暑研方向，导师随手在台阶上画了个模型草图，路过的一个数院教授也加入进来，两个教授蹲在地上用粉笔画了十几分钟；晚上给导师发邮件说想选某个方向，十分钟后就收到了回复：\u201c来我办公室聊。\u201d"],"8":["上午在杜厦图书馆四楼刷数学分析习题，下午去化学楼做定量分析实验，晚上和匡院同学在食堂聊各自想去的分流方向——每个人想去的专业都不一样。","在杜厦图书馆三楼靠窗的位置刷了一上午物理习题集，抬头发现窗外的那棵银杏已经黄了一半；中午在十食堂和不同分流方向的匡院同学吃饭，学物理的在讲薛定谔方程，学生物的在聊CRISPR，你坐在中间觉得脑细胞不够用。","在化学楼做定量分析实验时滴定终点颜色判断有分歧，和搭档一个说浅粉一个说微红，最后助教说\u201c你们两个都对\u201d；晚上在宿舍边听音乐边做计算机作业，突然想到数学分析课上那个定理的另一种证明方式，赶紧放下键盘写下来。"],"9":["在仙林校区天文台调试光谱仪，透过望远镜看土星环，心里默默算着它的轨道参数；应天实验室里跟院士团队讨论系外行星的大气成分反演结果，兴奋到忘了吃晚饭。","凌晨三点在仙林天文台顶着困意守望远镜观测变星光变曲线，喝了第三杯咖啡之后终于等到了一组完整的光谱数据，旁边师兄笑着递过来一包饼干说\u201c天文人的日常\u201d。","在应天实验室的数据中心处理了一整天系外行星的凌星信号，从海量噪声中揪出那个微弱的周期性信号时，整个人往椅背上一靠，盯了一会儿天花板才回过神来；回宿舍路上抬头看到今天的月亮，下意识在心里换算它的地心距和相位角。"],"10":["在电子学院实验室里搭了一个简单的FM收发电路，听到耳机里传来清晰的广播声时差点跳起来；下午去听通信工程实验班的低空经济讲座，发现无人机交通管理比想象中复杂得多。","在电子学院实验室的示波器上终于看到了理想的方波信号，波形干净得像教科书上的示例图，拉着一旁的助教非要他看；下午在炜华体育场边跑步边听射频技术的播客，跑到第三圈时突然想通了功放匹配电路的一个疑点。","在基础实验楼焊了一块四层PCB板，放到显微镜下检查焊点时发现有一个引脚虚焊，用烙铁补上后整块板子一次点亮；晚上在宿舍用软件无线电设备抓到了学校广播台的FM信号，调出来发现正在播天气预报。"],"11":["在EDA实验室里盯着芯片版图布局布线，和一根关键信号线的寄生参数较劲了整个下午；去中芯国际的产线参观，看到晶圆上纳米级的纹路时倒吸一口凉气。","在集成电路学院的软件仿真平台上跑了一版全芯片的数字后端布局，看到时延收敛的报告时心里松了口气；中午在食堂和同学讨论FinFET和GAA晶体管的优劣，争论到一半掏出手机查论文数据。","在EDA实验室里一口气修了二十几个DRC违例，每修完一个就跑一次验证，到最后一个通过时天已经黑了；走出学院楼发现外面下着小雨，脑子里还在想着那个关键路径的优化方案。"],"12":["上午在基础实验楼焊电路板，下午穿过大活赶去外国语学院上科技英语写作；在国际学术会议上用英文流利地做poster展示，被一位MIT教授追问了十分钟细节。","在基础实验楼的电路实验室里用面包板搭了一个信号放大器，接上示波器看到增益符合设计值，在实验报告上用英文工整地写下测试结论；下午在大活咖啡厅和一个德国交换生聊5G标准，发现自己能用英语把MIMO技术的原理说清楚。","在国际会议中心的签到处做志愿者负责接待外宾，一位来自剑桥的教授看到你的胸牌专业后跟你聊了十分钟华为的芯片方案；晚上回到宿舍又打开科技英语写作课的PPT，发现白天开会时听到的术语正好是下周要学的内容。"],"13":["在人工智能学院的实验室里训练图像分类模型，调了一下午超参数终于把准确率提了2个点；和周志华教授课上讲的内容一结合，顿时理解了梯度背后的数学直觉。","在人工智能学院的GPU服务器前面排队等算力，等了一个小时终于轮到自己的任务跑了，看着训练曲线稳步下降时内心无比满足；下午在学院的一楼大厅看到周志华教授被一群学生围着问问题，站在外围蹭着听了一会儿。","在实验室里用PyTorch复现了一篇顶会论文的模型，跑出来的指标和论文基本一致，在群里发了个消息\u201creproduced!\u201d，收到三个点赞和一个\u201c大佬带带我\u201d；晚上去计算机系的学术讲座，听到一个没见过的优化器思路，赶紧打开手机备忘录记下来。"],"14":["在计算机系楼的机房里调试分布式系统的大作业，debug到凌晨终于跑通了第一个完整用例；和同学在走廊的黑板前争论一个算法的时间复杂度，谁也说服不了谁。","在计算机系楼的实验室里用gdb单步跟踪了一个指针越界的bug，找到错误的那一行代码时对着屏幕做了个胜利的手势；下午在系楼二楼的走廊里听到隔壁实验室传来一阵欢呼——有人跑通了新版本的操作系统内核。","在系楼的研讨室里和四个队友为了分布式共识算法的Raft实现吵得面红耳赤，最后敲定方案后一起去食堂吃饭，路上还在争论Leader Election的细节；晚上在宿舍继续刷LeetCode，室友说\u201c你刷题的样子好像在打职业比赛\u201d。"],"15":["在工程管理学院的实验室里用Python搭建量化回测系统，跑完策略曲线的那一刻忍不住喊了声\u201cnice\u201d；晚上在宿舍同时肝计算机的操作系统大作业和金融工程的风险模型报告。","在工程管理学院的数据中心用回测框架跑了一整年的量化策略，看到夏普比率超过2的那一刻心跳都加速了；下午去计算机学院上操作系统课，脑子里还在想着刚才回测结果里那个异常的回撤点。","在仙林校区的杜厦图书馆四楼同时摊开一本《算法导论》和一本《期权、期货及其他衍生品》，左右脑交替切换；和商学院的金融工程同学组队参加量化交易比赛，他负责策略逻辑，你负责代码实现和回测优化。"],"16":["在软件学院的智慧教室里和队友一起做云原生应用开发，前后端联调成功时击掌庆祝；在GitHub上开源了一个小工具，收到第一个star时开心了整整一天。","在软件学院的工位上和队友一起review代码，发现一个并发竞态条件的问题，大家讨论了一小时终于想出了一个优雅的锁方案；下午在教学楼的自动售货机前买水时看到手机弹出一条GitHub通知——有人给你开了一个Issue，赶紧喝完水跑回去看。","在云计算实验室里部署了一套Kubernetes集群，所有Pod都running的那一刻拍了张照片发到群里；晚上在宿舍写了一个自动签到脚本，室友说\u201c你把这个做成开源项目肯定很多人star\u201d。"],"17":["上午在软件学院写微服务接口，下午穿过校园去商学院做数字化案例的小组pre；数字化转型实战项目中同时画架构图和写商业计划书，队友说你一个人干了半支队伍的活。","在软件学院的机房写完了微服务模块的接口文档，转头就在商学院的课上做数字化供应链的案例分析pre，两种思维模式在脑子里打架；中午在食堂和工商管理的同学聊创业计划，他说你的技术视角恰好补上了他商业计划书的短板。","在数字化转型实战项目的路演环节前一夜，跟队友在酒店房间里改PPT改到凌晨三点，商业计划书和系统架构图交替修改；第二天站在讲台上答辩时，投资人的提问你都能从技术和市场两个角度回答上来。"],"18":["用爬虫抓了某电商平台一整季度的价格数据，然后用计量模型分析出隐藏的定价策略；在数字经济研究课上展示分析结果时，老师说这是研究生水平的报告。","在杜厦图书馆用Python跑了一组A股的历史数据回测，发现一个简单的动量策略居然能跑赢沪深300，兴奋地发给经济学基友让他帮忙验证逻辑是否成立；下午在软件学院上数据库课时偷偷翻经济学的论文，被老师点名起来回答问题。","在数字经济实验室里用NLP技术爬取财经新闻的情感指数，和宏观经济数据的走势图叠在一起分析相关性，画出的那张热力图漂亮得想装裱起来；晚上和室友争论\u201c比特币是不是数字经济的未来\u201d，谁也说服不了谁。"],"19":["在机器人实验室里调试自主导航算法，看着机器人第一次顺利绕过所有障碍物时差点鼓掌；参加全国智能车竞赛，在炜华体育场的跑道上通宵优化控制策略。","在机器人实验室里给机械臂做手眼标定，反复采集了二十组数据后标定精度终于到了亚毫米级；下午去炜华体育场测试无人车的避障算法，操控着它在跑道上绕锥桶，有几个路过的小孩以为在拍电影。","在智能系统实验室里调试语音控制机械臂的demo，对着麦克风说了三遍\u201c抓取杯子\u201d它才有反应，助教笑着说\u201c这很真实\u201d；晚上在宿舍看ROS的官方文档看到一个实用的包，赶紧加到项目依赖里。"],"20":["在环境学院实验室里分析水样中的重金属含量，数据结果显示治理后的浓度显著低于国标；下午在仙林校区采集大气颗粒物样本，和同学讨论PM2.5对人体健康的长期影响。","在环境学院的色谱室里分析大气样本中的VOCs成分，图谱上某个峰的信号强度超出了预期，标记下来准备写进实验报告的讨论部分；下午去仙林校区的生态湿地采样，看到几只白鹭在水边觅食，心想这大概就是治理成效最好的证明。","在实验室里用便携式水质检测仪测了仙林校区九乡河上下游各五个断面的参数，发现下游校园段的水质明显优于上游，成就感油然而生；傍晚在炜华体育场散步，跟同学讨论刚读完的一篇关于微塑料对人体健康影响的最新论文。"],"21":["在仙林校区的基础医学实验室里做细胞培养实验，小心翼翼地用移液枪操作；下午去鼓楼医院观摩一台心脏搭桥手术，看到主刀医生行云流水的操作时心里涌起一股敬意。","在仙林校区医学院的人体解剖实验室里站了一整个下午，标本上的每一根神经和血管都对应着教科书上的名字，合上书本后闭上眼睛还能在脑海里重建出三维结构；晚上在宿舍看手术录像，室友路过瞄了一眼赶紧转开头说\u201c你吃得下饭吗\u201d。","在鼓楼医院的门诊跟诊，一位老奶奶握着他的手说\u201c医生你帮我看看\u201d，他赶紧转头看带教老师的眼神确认自己该不该开口；下午在病案室里翻阅了一个罕见病例的完整资料，发现课本上两句话的描述背后是患者好几年的求医历程。"],"22":["在仿头模实验室里练习牙体制备，握着高速涡轮手机的手稳定得让自己都惊讶；下午在口腔医学院听教授讲种植牙的材料学进展，才发现一颗假牙背后的科技含量远超想象。","在口腔医学院的仿头模实验室里练习了三个小时的全冠预备，右手腕酸得抬不起来，但最后一个预备体的聚合度终于控制在理想范围内；下午去医院口腔科见习，看到一个小朋友拔牙前紧张得大哭，你学着带教老师的样子蹲下来安慰他。","在口腔生物材料实验室里调了一种新型的骨替代材料，硬度测试结果比现有材料好了一大截，准备跟导师汇报时发现已经到了晚饭时间；在食堂碰到同班同学，两人互相看了对方的手——练习牙体制备磨出的茧子位置一模一样。"],"23":["用仿真软件给一家制造企业做了产线优化方案，layout改了三版后效率提升了18%；在智慧系统实验室里调试AGV小车的调度算法，看着它在模拟产线上顺畅运行。","用Plant Simulation给一家电子厂的SMT产线做了仿真模型，调整了物料配送路径后产能瓶颈明显缓解，甲方看了报告后说\u201c你们南大的学生确实不一样\u201d；下午在智慧系统实验室用AGV小车做路径规划测试，在它卡在一个死角时蹲下来手动推了一把。","在仙林校区基础实验楼的智慧系统实验室里和组员一起调试工业机械臂的抓取程序，运行了五十次抓取成功四十九次，还差那一次又调了半小时；晚上在杜厦图书馆看运筹学的教材，发现书上的排队论模型正好可以用在昨天的产线优化里。"],"24":["在社会学院的资料室里整理田野调查的访谈记录，发现有几位受访者不约而同地提到了同一个关键词；下午去政府管理学院听一场关于数字治理的讲座，笔记记了满满三页。","在社会学院的办公室跟导师讨论问卷设计，为了一个问题应该用李克特五点量表还是七点量表争论了二十分钟；下午去仙林街道做社区调研，在居委会和一群大爷大妈聊了两个小时，收获了一堆意料之外的视角。","在政府管理学院的案例教室里模拟联合国安理会辩论，代表一个非洲小国在为气候融资议题争取权益，发言前在便签纸上写了三版措辞；晚上在杜厦图书馆翻一本社会学的经典著作，发现一百年前的理论和今天的社会现象仍有解释力。"],"25":["在杜厦图书馆的古籍阅览室里翻到一册清代刻本，指尖轻轻划过书页上的文字；下午去新闻传播学院的演播厅体验了一把虚拟演播室录制，发现当主播比自己想象中难得多。","在杜厦图书馆的古籍部申请借阅了一册明刻本的《世说新语》，翻开时闻到陈旧的纸墨味，小心翼翼地翻了一页又一页；下午在新传院的剪辑室里剪了一部五分钟的纪录短片，导出时进度条走完的那一刻长舒一口气。","在文学院的走廊里听到隔壁教室传来有人朗诵楚辞的声音，停下来听了两分钟才走；下午去鼓楼校区的北大楼前参加一个诗歌沙龙，坐在草坪上听学长读自己写的诗，阳光暖洋洋的让人想眯起眼睛。"],"26":["在商学院的案例分析室里和组员一起做企业估值pre，被教授追问财务模型中的一个假设前提，你沉着地给出了推导过程；中午在食堂边吃饭边刷A股行情。","在商学院的数据分析实验室里用R语言跑了一组上市公司的面板数据回归，显著性结果出来时对着屏幕点了点头；中午在食堂翻手机看美股的盘前行情，旁边的同学探头过来问\u201c今天买哪支\u201d。","在案例教室里和组员做了一上午的企业并购案例分析，算了两版估值模型结果差了20%，最后发现是折现率取错了；下午在仙林校区的河畔散步复盘讨论过程，突然想到刚才DCF模型里忘了调整终值增长率。"],"27":["在逸夫管理科学楼的模拟仲裁庭上全英文辩论，对手是国际法专业的学长，双方火力全开互不相让；在北大楼前的草坪上和同学讨论WTO最新判例，阳光透过爬山虎洒在案例书上。","在逸夫管理科学楼的模拟法庭里穿着法袍做了一 function dimAvg(di, pi){
  let s=0,c=0;
  for(let i=0;i<QBASE.length;i++){if(ans[i]===undefined)continue;const q=QBASE[i];if(q.dim===di&&q.po===pi){s+=ans[i];c++;}}
  return c>0?s/c:0;
}
function getType(){
  let code='';

    const a0=dimAvg(d,0),a1=dimAvg(d,1);

  return code;
}
function setExtra(){
  const baseVals=ans.slice(0,12).filter(v=>v!==undefined);

    ];
    return;
  }
  const t=TYPES[getType()];
  extraQ=t&&t.ex?t.ex:[];
}
function getBestMajor(){
  const t=TYPES[getType()];
  if(!t||!t.m||!t.m.length)return null;
  const scores={};
  t.m.forEach(mi=>scores[mi]=0);
  for(let ei=0;ei<extraQ.length;ei++){
    const av=ans[12+ei];
    if(av===undefined)continue;
    Object.entries(extraQ[ei].map).forEach(([mi,w])=>scores[parseInt(mi)]+=(w[av-1]||0));
  }
  return t.m.reduce((best,mi)=>scores[mi]>(scores[best]||-1)?mi:best,t.m[0]);
}
